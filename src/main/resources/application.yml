app:
  debug-features-enabled: true

logging:
  level:
    root: INFO

springdoc:
  api-docs:
    enabled: ${app.debug-features-enabled:false}
    path: /openapi
  swagger-ui:
    enabled: ${app.debug-features-enabled:false}
    path: /swagger-ui.html
    use-root-path: true
server:
  port: 3000

spring:
  datasource:
    url: jdbc:postgresql://localhost:5434/postgres?sslmode=disable
    username: postgres
    password: admin
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
